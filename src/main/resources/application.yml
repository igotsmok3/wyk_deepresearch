server:
  port: 8080
spring:
  autoconfigure:
    exclude:
      - org.springframework.ai.vectorstore.milvus.autoconfigure.MilvusVectorStoreAutoConfiguration
      - org.springframework.ai.vectorstore.elasticsearch.autoconfigure.ElasticsearchVectorStoreAutoConfiguration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB
      enabled: true
      file-size-threshold: 1MB
  profiles:
    # LangFuse和可观测配置以及专业知识库配置
    include: observability, kb
  application:
    name: spring-ai-alibaba-deepresearch
  # Redis 配置
  data:
    redis:
      enabled: false
      host: localhost
      port: 6379
      password: ${REDIS-PASSWORD}
      timeout: 3000 # 连接超时时间（毫秒）
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY:${DASHSCOPE_API_KEY}}
      base-url: https://dashscope.aliyuncs.com
      chat:
        options:
          model: ${DASHSCOPE_CHAT_MODEL:qwen-turbo}
      embedding:
        options:
          model: text-embedding-v1

    mcp:
      client:
        enabled: false
        type: ASYNC
    alibaba:
      toolcalling:
        baidu:
          search:
            enabled: true
        tavilysearch:
          api-key: ${TAVILY_API_KEY}
          enabled: true
        jinacrawler:
          enabled: false
          api-key: ${JINA_API_KEY}
        serpapi:
          api-key: ${SERPAPI_KEY}
          enabled: true
        aliyunaisearch:
          api-key: ${ALIYUN_AI_SEARCH_API_KEY}
          base-url: ${ALIYUN_AI_SEARCH_BASE_URL}
          enabled: true
        # 学术研究工具调用配置
        openalex:
          enabled: false
        # 旅游生活工具调用配置
        opentripmap:
          enabled: false
          api-key: ${OPENTRIPMAP_API_KEY}
        # 百科知识工具调用配置
        wikipedia:
          enabled: false
        # 数据分析工具调用配置
        worldbankdata:
          enabled: false
        googlescholar:
          enabled: false
      deepresearch:
        # 图执行的最大迭代次数
        max-iterations: 50
        # 定义项目可以使用的搜索引擎
        search-list:
          - tavily
          - aliyun
          - baidu
          - serpapi
        smart-agents:
          enabled: false
          search-platform-mapping:
            academic_research:
              primary: openalex
            lifestyle_travel:
              primary: opentripmap
            encyclopedia:
              primary: wikipedia
            data_analysis:
              primary: worldbankdata
            general_research:
              primary: tavily
        mcp:
          enabled: false
          config-location: classpath:mcp-config.json
        parallel-node-count:
          researcher: 4
          coder: 4
        rag:
          enabled: true
          vector-store-type: elasticsearch
          user-file-ttl-days: 7
          milvus:
            host: localhost
            port: 19530
            database-name: default
            collection-name: deepresearch_test
            embedding-dimension: 1536
            dual:
              bm25-top-k: 5
              vector-top-k: 5
              retrieval-timeout-ms: 5000
          # 结构感知切分配置（markdown-splitter 和 pdf-splitter 默认启用，可按需关闭）
          markdown-splitter:
            enabled: true
            split-level: 2
            keep-code-block-intact: true
            keep-table-intact: true
            append-heading-path: true
          pdf-splitter:
            enabled: true
            heading-font-size-ratio: 1.2
            extract-tables: true
            table-output-format: markdown
          mineru:
            enabled: false
            api-base-url: https://mineru.net
            api-token: ${MINERU_API_TOKEN:}
            model-version: pipeline
            enable-formula: true
            enable-table: true
            language: ch
            polling-interval-ms: 5000
            max-polling-attempts: 72
          elasticsearch:
            uris: http://localhost:9200
            index-name: deepresearch-test-index
            dimensions: 1536
            similarity-function: cosine
            hybrid:
              enabled: true

        # 报告导出路径配置
        export:
          path: ${AI_DEEPRESEARCH_EXPORT_PATH}
        reflection:
          enabled: true
          max-attempts: 1
        # 短期记忆配置
        short-term-memory:
          enabled: true
          # 会话记忆配置
          conversation-memory:
            # 最长保留会话长度
            max-messages: 100
          # 用户角色记忆配置
          user-role-memory:
            # 用户角色短期记忆引导模型生成的范围
            guide-scope: every
            # 判定需要更新记忆时相似度阈值，范围0~1，默认0.8
            update-similarity-threshold : 0.8
            # 参考历史用户提问的条数
            history-user-messages-num: 10
          # 记忆类型
          memory-type: in-memory



logging:
  level:
    com.alibaba.cloud.ai.example.deepresearch: debug

